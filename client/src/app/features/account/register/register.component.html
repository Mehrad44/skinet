<mat-card class="max-w-lg mx-auto mt-32 p-8 bg-white">
    <form [formGroup]="retigsterForm" (ngSubmit)="onSubmit()">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-semibold text-primary">Register</h1>

        </div>

        <app-text-input label="First Name"  formControlName="firstName"></app-text-input>
        
        <app-text-input label="Last Name"  formControlName="lastName"></app-text-input>
        
        <app-text-input label="Email Address"  formControlName="email"></app-text-input>
        
        <app-text-input label="Password" type="password" formControlName="password" type="password"></app-text-input>

    

        @if(validationErros){
            <div class="mb-3 p-4 bg-red-100 text-red-500">
                <ul class="list-disc px-3">
                    @for(error of validationErros ; track $index){
                        <li>{{error}}</li>
                    }
                </ul>
            </div>
        }
        <button 
        [disabled]="retigsterForm.invalid"
         mat-flat-button 
         type="submit" 
         class="w-full py-2">Register</button>
    </form>
</mat-card>
